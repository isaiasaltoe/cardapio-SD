apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: cardapio
spec:
  # PROTEÇÃO TESTE 2: Múltiplas Réplicas (Redundância contra Pod Kill)
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          # PROTEÇÃO TESTE 3: Limites de Recursos contra Vizinho Barulhento (Stress)
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m" # Limite restrito para forçar o auto-scaling a agir cedo
              memory: "512Mi"
          # PROTEÇÃO TESTE 1: Readiness Probe contra Latência de Rede
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2 # Se demorar > 2s devido à lentidão de rede, tira da rota!
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: cardapio
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31641
  selector:
    app: api
