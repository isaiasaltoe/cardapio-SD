# Serve o build estatico do React e faz fallback para index.html,
# necessario para o React Router funcionar ao acessar rotas direto (ex: /login).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
